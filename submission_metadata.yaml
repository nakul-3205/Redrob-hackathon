ai_usage_summary: |
  Used Claude for architectural discussion, code review, and debugging.
  The scoring logic, weight tuning, and design decisions were done by me.
  No candidate data was fed to any LLM at any point.
  The ranking step makes zero external API calls.

# ── Approach summary ───────────────────────────────────────────────────────
methodology_summary: |
  Rule-based candidate ranker with five components: honeypot detection,
  career scorer, skill scorer, behavioral signal scorer, and a weighted
  combiner. Honeypot detection flags profiles with impossible skill
  durations or expert inflation before scoring begins. Career scorer
  hard-kills mismatched titles (HR Managers, Accountants, etc.) regardless
  of skills, eliminating keyword stuffers entirely. Skill scorer weights
  must-have retrieval skills (FAISS, Qdrant, Weaviate, embeddings, NDCG,
  learning-to-rank) using proficiency x log(duration) x trust, where trust
  is derived from platform assessment scores over peer endorsements over
  self-claims. Signal scorer covers all 23 behavioral signals with emphasis
  on recency, recruiter response rate, notice period, and location relative
  to target cities. Job description text is scanned to boost candidates
  whose titles are weak but whose actual work was retrieval-related. Final
  score combines components 40/35/25 skill/career/signal, with signal also
  applied as a multiplier to gate truly unavailable candidates. Reasoning
  strings are assembled from computed features — no LLM calls at runtime.
  Runs in ~25 seconds on 100K candidates, CPU only.

