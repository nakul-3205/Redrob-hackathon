ai_usage_summary: |
  Used Claude for code review, architectural discussion, and debugging.
  No candidate data was fed to any LLM. All scoring logic is deterministic
  and rule-based. The ranking pipeline makes zero API calls during execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker derived directly from the JD's explicit and
  implicit requirements. The pipeline has six stages:

  1. Honeypot detection — four hard checks catch fabricated profiles before
     any scoring: impossible skill durations (>1.2x YoE), expert inflation
     (8+ expert skills with <3 YoE), career timeline overlap (past job months
     >1.6x stated YoE), and age-impossibility from career start dates.

  2. Hard title kill — titles like HR Manager, Accountant, Civil Engineer are
     eliminated immediately via a tiered lookup; career score of 0.0 is a
     short-circuit with no further scoring.

  3. Skill score (40% weight) — each skill value = proficiency_weight x
     trust_multiplier x log_duration_bonus. Trust is derived from platform
     assessment scores > peer endorsements > self-claimed. Skills mapped to
     MUST_HAVE, NICE_TO_HAVE, and NEGATIVE buckets from the JD. Two special
     penalties: LangChain/LlamaIndex wrapper-only flag (-0.15), and off-domain
     (pure CV/speech with no NLP/IR depth) penalty.

  4. Career score (35% weight) — title tier (50%) + YoE band (30%) + company
     background (20%). Company score is duration-weighted over career history;
     product tech companies score 0.95, pure consulting firms 0.20.

  5. Signal score (25% weight) — recency (30%), recruiter responsiveness (25%),
     notice period (20%), location match (15%), extras such as GitHub activity
     and profile completeness (10%).

  6. Combine — weighted sum multiplied by an availability multiplier
     (0.55 + 0.45 × signal) so unreachable candidates are penalised but not
     zeroed. Runtime: ~13 seconds for 100K candidates on CPU.

